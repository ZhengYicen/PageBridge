version: "3.8"

services:
  # ── MinerU PDF 解析服务 ──────────────────────
  mineru:
    image: mineru:latest
    container_name: ai-reader-mineru
    shm_size: 32g
    ipc: host
    ports:
      - "8001:8000"  # 映射到 8001 避免冲突
    command:
      - mineru-api
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      - MINERU_MODEL_SOURCE=modelscope
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - mineru      # 默认不启动，需要时: docker compose --profile mineru up
    restart: unless-stopped

  # ── 后端 ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-reader-backend
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    env_file:
      - .env
    environment:
      - MINERU_URL=http://mineru:8000
    depends_on:
      - mineru
    restart: unless-stopped

  # ── 前端 ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-reader-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
