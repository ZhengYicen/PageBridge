services:
  # ── 后端 API ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pagebridge-backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./storage:/app/storage
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── 后台 Worker（翻译 + 解析任务队列） ──────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pagebridge-worker
    volumes:
      - ./storage:/app/storage
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    command: python -m backend.worker

  # ── 前端 ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pagebridge-frontend
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
